# Config Reference: https://github.com/stoatchat/stoatchat/blob/stable/crates/core/config/Revolt.toml
# Default values for stoat.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.


global:
  namespace: 'stoat'
  # Domain name used for access, ex stoat.example.com
  domain: ''
  version:
    app: 'v0.12.1'
    web: 'v0.5.0'
    livekit: 'v1.9.13'

  web:
    port: 5000
  api:
    port: 14702
  events:
    port: 14703
  autumn:
    port: 14704
  january:
    port: 14705
  gifbox:
    port: 14706
  livekit:
    port: 7880
    range_start: 50000
    range_end: 50100
  voice:
    port: 8500
  all:
    deployment:
      annotations: {}
    service:
      annotations: {}

  secret:
    vapid_key: ''
    vapid_public_key: ''
    encryption_key: ''
    livekit_key: ''  # openssl rand -hex 6
    livekit_secret: ''  # openssl rand -hex 24

  ingress:
    enabled: false
    className: ''
    annotations: {}
    extra_hosts: []

  route:
    enabled: false
    parentRefs: []
    annotations: {}

  serviceAccount:
    create: true
    automount: true
    annotations: { }
    name: ''

  smtp:
    # If host is filled in, you must fill in all other smtp fields
    host: ''
    username: ''
    password: ''
    from: ''
    reply_to: ''
    port: 587
    use_tls: false
    use_starttls: false

  subcharts:
    mongo:
      enabled: true  # Set to false to use external MongoDB
      connection_url: ''
    redis:
      enabled: true  # Set to false to use external Redis
      connection_url: ''
    garage:
      enabled: true  # Set to false to use external s3
      connection_url: ''
    rabbitmq:
      enabled: true  # Set to false to use external RabbitMQ
      host: ''
      port: 5672
      username: 'rabbituser'
      password: 'rabbitpass'



stoat:
  # Reference: https://github.com/stoatchat/stoatchat/blob/stable/crates/core/config/Revolt.toml
  config:
    production: false
    api:
      registration:
        invite_only: false
      smtp:
        host: ''
        port: 587
        use_tls: true
        username: ''
        password: ''
        from_address: ''
        reply_to: ''
      security:
        authifier_shield_key: ''
        voso_legacy_token: ''
        trust_cloudflare: false
        easypwned: ''
        captcha:
          hcaptcha_key: ''
          hcaptcha_sitekey: ''
      workers:
        max_concurrent_connections: 50
      users: {}
    pushd:
      production: true
      mass_mention_chunk_size: 200
      exchange: 'revolt.notifications'
      message_queue: 'notifications.origin.message'
      mass_mention_queue: 'notifications.origin.mass_mention'
      fr_accepted_queue: 'notifications.ingest.fr_accepted'
      fr_received_queue: 'notifications.ingest.fr_received'
      generic_queue: 'notifications.ingest.generic'
      ack_queue: 'notifications.process.ack'
      vapid:
        queue: 'notifications.outbound.vapid'
        private_key: ''
        public_key: ''
      fcm:
        queue: 'notifications.outbound.fcm'
        key_type: ''
        project_id: ''
        private_key_id: ''
        private_key: ''
        client_email: ''
        client_id: ''
        auth_uri: ''
        token_uri: ''
        auth_provider_x509_cert_url: ''
        client_x509_cert_url: ''
      apn:
        sandbox: false
        queue: 'notifications.outbound.apn'
        pkcs8: ''
        key_id: ''
        team_id: ''
    files:
      encryption_key: ''
      webp_quality: 80.0
      blocked_mime_types: []
      clamd_host: ''
      scan_mime_types:
        - 'application/vnd.microsoft.portable-executable'
        - 'application/vnd.android.package-archive'
        - 'application/zip'
      limit:
        min_file_size: 1
        min_resolution:
          - 1
          - 1
        max_mega_pixels: 40
        max_pixel_side: 10000
      preview:
        attachments:
          - 1280
          - 1280
        avatars:
          - 128
          - 128
        backgrounds:
          - 1280
          - 720
        icons:
          - 128
          - 128
        banners:
          - 480
          - 480
        emojis:
          - 128
          - 128
      s3:
        endpoint: ''
        path_style_buckets: true  # False for minio, true for most others
        region: 'garage'
        access_key_id: 'stoatautumn'
        secret_access_key: 'stoatautumn'
        default_bucket: 'stoat-uploads'
    features:
      webhooks_enabled: false
      mass_mentions_send_notifications: true
      mass_mentions_enabled: true
      limits:
        global:
          group_size: 100
          message_embeds: 5
          message_replies: 5
          message_reactions: 20
          server_emoji: 100
          server_roles: 200
          server_channels: 200
          new_user_hours: 72
          body_limit_size: 20_000_000
        new_user:
          outgoing_friend_requests: 5
          bots: 2
          message_length: 2000
          message_attachments: 5
          servers: 50
          file_upload_size_limit:
            attachments: 20_000_000
            avatars: 4_000_000
            backgrounds: 6_000_000
            icons: 2_500_000
            banners: 6_000_000
            emojis: 500_000
        default:
          outgoing_friend_requests: 10
          bots: 5
          message_length: 2000
          message_attachments: 5
          servers: 100
          file_upload_size_limit:
            attachments: 20_000_000
            avatars: 4_000_000
            backgrounds: 6_000_000
            icons: 2_500_000
            banners: 6_000_000
            emojis: 500_000
      advanced:
        process_message_delay_limit: 5
    sentry:
      api: ''
      events: ''
      files: ''
      proxy: ''
      pushd: ''
      crond: ''



mongodb:
  architecture: standalone
  auth:
    enabled: false
  persistence:
    enabled: false
    resourcePolicy: keep
    persistentVolumeClaimRetentionPolicy:
      enabled: true
      whenDeleted: Retain
      whenScaled: Retain
  image:
    registry: docker.io
    repository: bitnamilegacy/mongodb
    tag: 8.0.13-debian-12-r0

redis:
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 8.2.1-debian-12-r0

rabbitmq:
  replicaCount: 1
  auth:
    username: 'rabbituser'
    password: 'rabbitpass'
  persistence:
    enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/rabbitmq
    tag: 4.1.3-debian-12-r1

garage:
#  mode: standalone
#  rootUser: minioautumn
#  rootPassword: minioautumn
#  persistence:
#    enabled: true
#    annotations:
#      helm.sh/resource-policy: keep
#  auth:
#    rootUser: 'minioautumn'
#    rootPassword: 'minioautumn'
  deployment:
    replicaCount: 3
  replicationFactor: 2


